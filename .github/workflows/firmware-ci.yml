name: Firmware CI

on:
  push:
    branches: [ ci-cd ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi

      - name: Configure
        run: |
          cmake -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

      - name: Build
        run: |
          cmake --build build

      - name: Check stack usage
        run: python3 scripts/check_stack_usage.py

      - name: Run cppcheck
        run: |
          sudo apt-get install -y cppcheck

          cppcheck --enable=warning,style,performance,portability \
                   --std=c++17 \
                   --inline-suppr \
                   --error-exitcode=1 \
                   App Services Drivers Legacy Config Common

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            build/**/*.elf
            build/**/*.hex
            build/**/*.bin
            build/**/*.map
            build/**/*.su